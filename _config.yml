title: JongPilot
description: 麻雀 AI コーチ — 利用規約・プライバシーポリシー
url: https://citrusworks.github.io
baseurl: /JongPilot

# GitHub Pages 公式サポート theme (= 設定 0、自動デプロイされる)
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links

# .md → クリーンな URL (= /privacy/, /terms/)
permalink: pretty

# 配置構成
include:
  - privacy.md
  - terms.md

# Markdown → HTML 変換時の挙動
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# 言語と地域
lang: ja-JP

# author / branding metadata
author: citrus works

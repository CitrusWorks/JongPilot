title: JongPilot
description: 麻雀 AI コーチ — 利用規約・プライバシーポリシー
url: https://citrusworks.github.io
baseurl: /JongPilot

# GitHub Pages 公式サポート theme (= ホワイトリスト済、追加 gem 不要)。
# https://pages.github.com/themes/ で「Cayman」として公開されている。
theme: jekyll-theme-cayman

# .md → クリーンな URL (= /privacy/, /terms/)。
# 個別 md の front matter の `permalink:` が優先される。
permalink: pretty

# Markdown → HTML 変換時の挙動 (GitHub Flavored Markdown)。
markdown: kramdown
kramdown:
  input: GFM

# 言語と地域。
lang: ja-JP

# author / branding metadata。
author: citrus works

# 余計なファイルを公開対象から除外。
exclude:
  - README.md
  - .gitignore

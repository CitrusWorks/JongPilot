---
<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ja-JP' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" media="screen"
          href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% seo %}
  </head>
  <body>
    <header class="page-header" role="banner">
      <h1 class="project-name">{{ page.title | default: site.title }}</h1>
      {%- if page.tagline -%}
        <h2 class="project-tagline">{{ page.tagline }}</h2>
      {%- endif -%}
    </header>
    <main id="content" class="main-content" role="main">
      {{ content }}
      <footer class="site-footer">
        <span class="site-footer-credits">© 2026 citrus works. All rights reserved.</span>
      </footer>
    </main>
  </body>
</html>
